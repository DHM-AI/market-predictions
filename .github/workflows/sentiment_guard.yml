name: Sentiment Guard

on:
  schedule:
    # Every hour Mon–Fri, 9 AM – 4 PM ET (13:00–20:00 UTC during EDT)
    - cron: '0 13,14,15,16,17,18,19,20 * * 1-5'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
      ALPHA_VANTAGE_KEY:  ${{ secrets.ALPHA_VANTAGE_KEY }}
      SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
      ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
      ALPACA_LIVE_MODE:   ${{ secrets.ALPACA_LIVE_MODE }}
      BANKROLL:           ${{ secrets.BANKROLL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Run sentiment guard
        run: python sentiment_guard.py
