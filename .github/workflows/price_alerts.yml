name: Price Alerts

# Checks the price_alerts table every 5 minutes during market hours and
# fires Slack notifications for any alerts whose target has been crossed.
# Free-tier GitHub Actions minimum cron interval is 5 min — that's fine,
# price alerts are not millisecond-sensitive.

on:
  schedule:
    # Every 5 minutes Mon–Fri, 9 AM – 4 PM ET (13:00–20:55 UTC during EDT).
    # Cron limitations on free tier: list all minutes explicitly per hour.
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Check price alerts
        run: python -m alerts.price_alerts check
