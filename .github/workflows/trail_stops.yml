name: Trailing Stop Manager

on:
  schedule:
    # Every 30 min, Mon–Fri during market hours (9:00 AM – 4:00 PM ET)
    - cron: '0,30 13,14,15,16,17,18,19,20 * * 1-5'
    # Weekend runs — tighten stops so they're ready for Monday open
    # Sat 9 AM ET + Sun 9 AM ET + Sun 6 PM ET (final prep before Monday)
    - cron: '0 13 * * 6'    # Saturday  9 AM ET
    - cron: '0 13 * * 0'    # Sunday    9 AM ET
    - cron: '0 22 * * 0'    # Sunday    6 PM ET — final sweep before Monday open
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  trail:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL }}
      ALPACA_LIVE_MODE:  ${{ secrets.ALPACA_LIVE_MODE }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      BANKROLL:          ${{ secrets.BANKROLL }}
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trailing stop check
        run: python trail_stops.py
