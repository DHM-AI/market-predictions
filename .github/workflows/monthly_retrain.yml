name: Monthly Model Retrain

# Runs on the first Monday of every month at 6 AM ET.
# Also runs whenever model/trainer.py or signals/ changes are pushed.
# Keeps the XGBoost model fresh as market conditions evolve.

on:
  schedule:
    - cron: '0 10 1-7 * 1'  # First Monday of the month, 6 AM ET (UTC-4)
  push:
    paths:
      - 'model/trainer.py'
      - 'signals/technicals.py'
  workflow_dispatch:           # Manual trigger anytime from Actions tab

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # Training can take up to 45 minutes on 3 years of data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # needed to push model artifacts back

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Train XGBoost model
        run: python -m model.trainer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit updated model artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/saved/xgb_model.pkl model/saved/feature_names.json model/saved/calibrator.pkl || true
          git diff --staged --quiet || git commit -m "chore: monthly model retrain + Platt calibration [skip ci]"
          git push || echo "Nothing to push"

      - name: Notify Slack on completion
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"; MSG="Monthly retrain *complete*. New model pushed to repo."
          else
            ICON="❌"; MSG="Monthly retrain *FAILED*. Check Actions logs."
          fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"$ICON *XGBoost Retrain — $(date +'%b %Y')* \\n$MSG\"}"
