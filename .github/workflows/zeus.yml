name: ZEUS — Full System Audit

on:
  schedule:
    - cron: '0 3 * * 2-6'   # 11:00 PM ET Mon–Fri (3:00 AM UTC next day)
  workflow_dispatch:         # Run manually any time from GitHub Actions tab

jobs:
  zeus:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Run ZEUS full system audit
        run: python zeus.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALPHA_VANTAGE_KEY:  ${{ secrets.ALPHA_VANTAGE_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_LIVE_MODE:   ${{ secrets.ALPACA_LIVE_MODE }}
          BANKROLL:           ${{ secrets.BANKROLL }}

      # GitHub marks the run RED if zeus.py exits with code 1 (any FAIL)
      # ZEUS runs after ORACLE (10 PM) so it sees the full day's state
