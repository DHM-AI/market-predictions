name: Illuminati — Daily Scan (ARGUS · CIPHER · PYTHIA · THEMIS · APEX · ORACLE)

on:
  schedule:
    # All times in UTC. Market hours ET = UTC-4 (EDT, summer) / UTC-5 (EST, winter)
    # Currently EDT (UTC-4):
    - cron: '0 11 * * 1-5'    #  7:00 AM ET — pre-market open
    - cron: '0 12 * * 1-5'    #  8:00 AM ET — pre-market momentum
    - cron: '0 13 * * 1-5'    #  9:00 AM ET — market just opened
    - cron: '30 13 * * 1-5'   #  9:30 AM ET — exact market open
    - cron: '30 14 * * 1-5'   # 10:30 AM ET — mid-morning momentum
    - cron: '0 15 * * 1-5'    # 11:00 AM ET — late morning
    - cron: '0 16 * * 1-5'    # 12:00 PM ET — midday
    - cron: '0 17 * * 1-5'    #  1:00 PM ET — early afternoon
    - cron: '0 18 * * 1-5'    #  2:00 PM ET — afternoon
    - cron: '0 19 * * 1-5'    #  3:00 PM ET — pre-power hour
    - cron: '30 19 * * 1-5'   #  3:30 PM ET — power hour
    - cron: '0 20 * * 1-5'    #  4:00 PM ET — after-hours check
    - cron: '0 2 * * 2-6'     # Mon–Fri 10 PM ET — ORACLE daily intelligence cycle (2 AM UTC next day)

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        type: choice
        options: [scan, postmortem, scan-no-trade]

jobs:
  agent:
    runs-on: ubuntu-latest
    # Bumped 30 → 60 min — yfinance rate limiting + delisted-ticker timeouts
    # were causing 30-min timeouts. Most scans complete in ~10-15 min but
    # under rate-limit conditions can run 25-40 min.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Run agent
        run: |
          if [ "${{ github.event.inputs.mode }}" = "postmortem" ]; then
            python -c "from analyst.oracle import run; run()"
          elif [ "${{ github.event.schedule }}" = "0 2 * * 2-6" ]; then
            python -c "from analyst.oracle import run; run()"
          elif [ "${{ github.event.inputs.mode }}" = "scan-no-trade" ]; then
            python agent.py --no-trade
          else
            python agent.py
          fi
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALPHA_VANTAGE_KEY:  ${{ secrets.ALPHA_VANTAGE_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_LIVE_MODE:   ${{ secrets.ALPACA_LIVE_MODE }}
          BANKROLL:           ${{ secrets.BANKROLL }}
