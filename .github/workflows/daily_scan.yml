name: Market Predictions Agent

on:
  schedule:
    - cron: '0 13 * * 1-5'    # 8:00 AM ET — pre-market scan
    - cron: '30 16 * * 1-5'   # 11:30 AM ET — midday re-scan
    - cron: '0 20 * * 1-5'    # 3:00 PM ET — near-close scan
    - cron: '0 14 * * 0'      # Sunday 9 AM ET — weekly post-mortem
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        type: choice
        options: [scan, postmortem, scan-no-trade]

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: |
          if [ "${{ github.event.inputs.mode }}" = "postmortem" ]; then
            python agent.py --postmortem
          elif [ "${{ github.event.schedule }}" = "0 14 * * 0" ]; then
            python agent.py --postmortem
          elif [ "${{ github.event.inputs.mode }}" = "scan-no-trade" ]; then
            python agent.py --no-trade
          else
            python agent.py
          fi
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          ALPHA_VANTAGE_KEY:  ${{ secrets.ALPHA_VANTAGE_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:     ${{ secrets.GMAIL_APP_PASS }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_LIVE_MODE:   ${{ secrets.ALPACA_LIVE_MODE }}
          BANKROLL:           ${{ secrets.BANKROLL }}
